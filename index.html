<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stop The Slop | AI Complaint Board</title>
  <meta
    name="description"
    content="A place to vent about AI, with a home feed that mixes community complaints and fresh web sightings."
  />
  <script src="./analytics-config.js"></script>
  <script src="./analytics-bootstrap.js?v=20260327a"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="./src/StopTheSlopLogo.png" />
  <link rel="stylesheet" href="./styles.css?v=20260410c" />
</head>
<body data-page="home">
  <div class="page-shell page-shell-board">
    <div class="bg-grid"></div>

    <header class="board-header">
      <a class="brand" href="./index.html" aria-label="Stop The Slop home">
        <img class="brand-logo" src="./src/StopTheSlopLogoHorizontal.png" alt="Stop The Slop" />
      </a>
      <p class="board-tagline">A place to vent about AI.</p>
      <p class="board-subtag">Community complaints mixed with fresh AI slop sightings from around the web.</p>
    </header>

    <main class="board-stream-shell">
      <div class="complaint-stream" id="home-feed" aria-live="polite"></div>
    </main>
  </div>

  <button class="post-launcher" id="post-open" type="button">Post</button>

  <section class="post-sheet" id="post-sheet" hidden>
    <button class="post-sheet-backdrop" type="button" data-close-post aria-label="Close post form"></button>
    <div class="post-sheet-panel">
      <div class="post-sheet-topline">
        <div>
          <p class="eyebrow">New Complaint</p>
          <h2>What did the AI do?</h2>
        </div>
        <button class="sheet-close" id="post-close" type="button" aria-label="Close">Close</button>
      </div>

      <form class="composer-form post-form" id="composer-form">
        <label class="signal-textarea">
          <span>Say it plainly.</span>
          <textarea
            id="composer-text"
            name="text"
            rows="7"
            maxlength="6000"
            placeholder="Example: Claude Code kept rewriting files I never asked it to touch."
          ></textarea>
        </label>

        <div class="form-footer post-form-footer">
          <div class="auth-note" id="composer-auth-note"></div>
          <div class="form-actions">
            <button class="button primary" id="composer-submit" type="submit">Post Complaint</button>
          </div>
        </div>
      </form>
    </div>
  </section>

  <script src="./api-config.js"></script>
  <script src="./app.js?v=20260410c" defer></script>
</body>
</html>
